services:
  app:
    build: .
    ports:
      - "8787:8787"
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      SOFFICE_PATH: ${SOFFICE_PATH:-soffice}
      PORT: "8787"
      SERVE_STATIC: "1"
      NODE_ENV: production
